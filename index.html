<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>witze-app</title>
    <link rel="stylesheet" href="output/style.css" />
  </head>
  <body>
    <div class="App">
      <div class="Header">
        <h1 class="Header__Headline">Witze App</h1>
      </div>
      <div class="Main">
        <h3 class="Main__Joke"><em>Lade einen Witz klicke den Button</em></h3>
        <div class="Main__BtnContainer">
          <button class="Btn Btn--Load">Neuen Witz Laden</button>
          <button class="Btn Btn--Inverted disabled">
            Witz Speichern
            <svg
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
              id="mdi-file-star-outline"
              viewBox="0 0 24 24"
              class="Btn__Svg"
            >
              <path
                d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2M18 20H6V4H13V9H18V20M9.5 18L10.2 15.2L8 13.3L10.9 13.1L12 10.4L13.1 13L16 13.2L13.8 15.1L14.5 17.9L12 16.5L9.5 18Z"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="Footer">
        <h4 class="Footer__Headline">Gespeicherte Witze</h4>
        <div class="Footer__JokeContainer"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
