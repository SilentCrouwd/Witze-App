<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>witze-app</title>
    <link rel="stylesheet" href="output/style.css" />
  </head>
  <body>
    <div class="App">
      <div class="App__Header">
        <h1 class="App__Header__Headline">Witze App</h1>
      </div>
      <div class="App__Main">
        <h3 class="App__Main__Joke">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Facilis error
          delectus similique minus nulla esse quia officia laboriosam ullam
          veniam.
        </h3>
        <div class="App__Main__BtnContainer">
          <button class="App__Main__BtnContainer__Btn">Neuen Witz Laden</button>
          <button
            class="App__Main__BtnContainer__Btn App__Main__BtnContainer__Btn--Inverted"
          >
            Witz Speichern
            <svg
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
              id="mdi-file-star-outline"
              viewBox="0 0 24 24"
              class="App__Main__BtnContainer__Btn__Svg"
            >
              <path
                d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2M18 20H6V4H13V9H18V20M9.5 18L10.2 15.2L8 13.3L10.9 13.1L12 10.4L13.1 13L16 13.2L13.8 15.1L14.5 17.9L12 16.5L9.5 18Z"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="App__Footer">
        <h4 class="App__Footer__Headline">Gespeicherte Witze</h4>
        <div class="App__Footer__JokeListeContainer">
          <div class="App__Footer__JokeListe">
            <p class="App__Footer__JokeListe__SavedJoke">Hier iste ein Witz</p>
            <button class="App__Footer__JokeListe__DeleteBtn">
              <svg
                fill="currentColor"
                xmlns="http://www.w3.org/2000/svg"
                id="mdi-delete-forever"
                class="App__Footer__JokeListe__DeleteBtn__Svg"
                viewBox="0 0 24 24"
              >
                <path
                  d="M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19M8.46,11.88L9.87,10.47L12,12.59L14.12,10.47L15.53,11.88L13.41,14L15.53,16.12L14.12,17.53L12,15.41L9.88,17.53L8.47,16.12L10.59,14L8.46,11.88M15.5,4L14.5,3H9.5L8.5,4H5V6H19V4H15.5Z"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
